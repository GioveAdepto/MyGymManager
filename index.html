<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f0f">
<title>Palestra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;--accent:#c8f535;--accent2:#ff6b35;--text:#f0f0f0;--muted:#888;--danger:#ff4444;--r:12px;--font:'Syne',sans-serif;--mono:'DM Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100dvh;overflow-x:hidden}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 4px;font-family:var(--font);font-size:9px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;letter-spacing:.04em;text-transform:uppercase;transition:color .15s}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:20px;height:20px;stroke-width:1.5}

/* PAGES */
.page{display:none;min-height:100dvh;padding:0 0 80px}
.page.active{display:block}

/* HEADER */
.page-header{padding:16px 16px 10px;position:sticky;top:0;background:var(--bg);z-index:50;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.header-text{flex:1}
.page-title{font-size:20px;font-weight:800;letter-spacing:-.02em}
.page-sub{font-size:11px;color:var(--muted);margin-top:2px;font-family:var(--mono)}
.refresh-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s}
.refresh-btn:active{border-color:var(--accent);color:var(--accent)}
.refresh-btn.spinning svg{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* DAY TABS */
.day-tabs{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;padding:8px 18px;border-radius:40px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.day-tab.active{background:var(--accent);color:#0f0f0f;border-color:var(--accent)}

/* EXERCISE CARD — SCHEDA */
.ex-list{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.ex-card.activation{border-left:3px solid var(--danger);opacity:.85}
.ex-header{display:flex;align-items:center;gap:10px;padding:12px 14px 10px}
.ex-num{width:22px;height:22px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;color:var(--muted);flex-shrink:0}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:600;line-height:1.3}
.ex-group{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.ex-actions{display:flex;gap:6px;flex-shrink:0}
.ex-action-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.ex-action-btn.del:active{border-color:var(--danger);color:var(--danger)}
.ex-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-top:1px solid var(--border)}
.stat-cell{background:var(--surface);padding:9px 6px;text-align:center}
.stat-label{font-size:10px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em}
.stat-val{font-size:15px;font-weight:600;font-family:var(--mono);margin-top:2px}
.stat-val.accent{color:var(--accent)}
.readonly-note{font-size:10px;color:var(--muted);font-family:var(--mono);padding:6px 14px;border-top:1px solid var(--border);font-style:italic}

/* ADD BTN */
.add-btn{margin:8px 16px 0;width:calc(100% - 32px);padding:13px;border-radius:var(--r);border:1px dashed var(--border);background:transparent;color:var(--muted);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.add-btn:active{background:var(--surface);color:var(--text)}

/* ELENCO ESERCIZI */
.ese-filters{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none}
.ese-filters::-webkit-scrollbar{display:none}
.ese-filter{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.ese-filter.active{background:var(--surface2);color:var(--text);border-color:var(--muted)}
.ese-search{margin:0 16px 10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:15px;padding:11px 14px;width:calc(100% - 32px);outline:none}
.ese-search:focus{border-color:var(--accent)}
.ese-list{padding:0 16px;display:flex;flex-direction:column;gap:8px}
.ese-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.ese-head{display:flex;align-items:center;gap:10px;padding:12px 14px 8px;cursor:pointer}
.ese-head-info{flex:1;min-width:0}
.ese-name{font-size:14px;font-weight:600;line-height:1.3}
.ese-meta{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.ese-chevron{color:var(--muted);transition:transform .2s;flex-shrink:0}
.ese-chevron.open{transform:rotate(180deg)}
.ese-body{display:none;border-top:1px solid var(--border)}
.ese-body.open{display:block}
.ese-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 14px}
.ese-field{display:flex;flex-direction:column;gap:5px}
.ese-field label{font-size:10px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em}
.ese-field input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:18px;font-weight:500;padding:10px;text-align:center;width:100%;-moz-appearance:textfield}
.ese-field input::-webkit-outer-spin-button,.ese-field input::-webkit-inner-spin-button{-webkit-appearance:none}
.ese-field input:focus{outline:none;border-color:var(--accent)}
.ese-save-btn{margin:0 14px 14px;width:calc(100% - 28px);padding:12px;border-radius:10px;background:var(--accent);color:#0f0f0f;border:none;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
.ese-save-btn:active{opacity:.8}
.ese-spieg{font-size:12px;color:var(--muted);padding:0 14px 12px;line-height:1.5;font-style:italic}

/* SESSIONE */
.session-header{padding:12px 16px}
.start-btn{width:100%;padding:15px;background:var(--accent);color:#0f0f0f;border:none;border-radius:var(--r);font-family:var(--font);font-size:15px;font-weight:800;cursor:pointer;transition:opacity .15s}
.start-btn:active{opacity:.85}
.start-btn:disabled{background:var(--surface2);color:var(--muted);cursor:default}
.session-ex{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin:0 16px 10px;overflow:hidden}
.session-ex-head{padding:12px 14px;display:flex;align-items:center;gap:10px}
.session-ex-name{flex:1;font-size:14px;font-weight:600}
.session-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;transition:all .2s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.session-check.done{background:var(--accent);border-color:var(--accent)}
.serie-list{padding:0 14px 12px;display:flex;flex-direction:column;gap:8px}
.serie-row{display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:8px;padding:9px 12px}
.serie-num{font-family:var(--mono);font-size:12px;color:var(--muted);width:18px;flex-shrink:0}
.serie-input{background:transparent;border:none;color:var(--text);font-family:var(--mono);font-size:17px;font-weight:500;width:55px;text-align:center;-moz-appearance:textfield}
.serie-input::-webkit-outer-spin-button,.serie-input::-webkit-inner-spin-button{-webkit-appearance:none}
.serie-input:focus{outline:none;color:var(--accent)}
.serie-sep{color:var(--muted);font-size:12px;font-family:var(--mono)}
.serie-done-btn{margin-left:auto;width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.serie-done-btn.done{background:var(--accent);border-color:var(--accent)}
.save-session-btn{margin:12px 16px;width:calc(100% - 32px);padding:15px;background:var(--accent2);color:#fff;border:none;border-radius:var(--r);font-family:var(--font);font-size:15px;font-weight:800;cursor:pointer;display:none}
.save-session-btn.visible{display:block}

/* TIMER */
.timer-bar{position:fixed;top:0;left:0;right:0;background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:12px;z-index:99;transform:translateY(-100%);transition:transform .3s}
.timer-bar.visible{transform:translateY(0)}
.timer-label{font-size:11px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em}
.timer-count{font-size:22px;font-weight:800;font-family:var(--mono);color:var(--accent);min-width:48px}
.timer-stop{margin-left:auto;padding:6px 14px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer}

/* LOG */
.log-list{padding:0 16px}
.log-date-group{margin-bottom:20px}
.log-date-label{font-size:11px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:12px 0 8px;border-bottom:1px solid var(--border);margin-bottom:8px}
.log-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.log-gg{width:20px;height:20px;border-radius:4px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:10px;font-family:var(--mono);font-weight:500;color:var(--muted);flex-shrink:0}
.log-name{flex:1;font-size:13px;font-weight:500;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-detail{font-size:12px;font-family:var(--mono);color:var(--muted);flex-shrink:0}
.log-detail span{color:var(--accent)}

/* SEARCH OVERLAY */
.search-overlay{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.search-overlay.open{transform:translateY(0)}
.search-top{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.search-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:15px;padding:11px 14px;outline:none}
.search-input:focus{border-color:var(--accent)}
.search-cancel{color:var(--muted);font-family:var(--font);font-size:14px;background:none;border:none;cursor:pointer;white-space:nowrap}
.search-filters{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none}
.search-filters::-webkit-scrollbar{display:none}
.search-filter{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.search-filter.active{background:var(--surface2);color:var(--text);border-color:var(--muted)}
.search-results{flex:1;overflow-y:auto;padding:0 16px 20px}
.result-item{padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer}
.result-item:active{opacity:.6}
.result-name{font-size:14px;font-weight:600}
.result-meta{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:3px}
.result-stats{display:flex;gap:12px;margin-top:5px}
.result-stat{font-size:11px;font-family:var(--mono);color:var(--muted)}
.result-stat span{color:var(--text);font-weight:500}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 18px;font-size:13px;font-family:var(--mono);z-index:500;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--accent);color:var(--accent)}
.toast.error{border-color:var(--danger);color:var(--danger)}

/* LOADING / EMPTY */
.loading{display:flex;align-items:center;justify-content:center;height:200px;flex-direction:column;gap:12px}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.loading-text{font-size:12px;font-family:var(--mono);color:var(--muted)}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-text{font-size:13px;font-family:var(--mono)}
</style>
</head>
<body>

<!-- TIMER BAR -->
<div class="timer-bar" id="timerBar">
  <div>
    <div class="timer-label">Recupero</div>
    <div class="timer-count" id="timerCount">90</div>
  </div>
  <button class="timer-stop" onclick="stopTimer()">Skip</button>
</div>

<!-- PAGE: SCHEDA -->
<div class="page active" id="page-scheda">
  <div class="page-header">
    <div class="header-text">
      <div class="page-title">Scheda</div>
      <div class="page-sub" id="schedaStatus">Caricamento...</div>
    </div>
    <button class="refresh-btn" id="refreshScheda" onclick="forceRefresh('scheda')" title="Aggiorna">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>
  </div>
  <div class="day-tabs" id="dayTabs"></div>
  <div class="ex-list" id="exList">
    <div class="loading"><div class="spinner"></div><div class="loading-text">Carico dal foglio...</div></div>
  </div>
  <button class="add-btn" onclick="openSearch()" id="addExBtn" style="display:none">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Aggiungi esercizio al giorno
  </button>
</div>

<!-- PAGE: ELENCO ESERCIZI -->
<div class="page" id="page-esercizi">
  <div class="page-header">
    <div class="header-text">
      <div class="page-title">Esercizi</div>
      <div class="page-sub" id="eserciziStatus">Caricamento...</div>
    </div>
    <button class="refresh-btn" id="refreshEsercizi" onclick="forceRefresh('esercizi')" title="Aggiorna">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>
  </div>
  <input class="ese-search" id="eseSearch" placeholder="Cerca esercizio..." oninput="renderEsercizi()" autocomplete="off">
  <div class="ese-filters" id="eseFilters"></div>
  <div class="ese-list" id="eseList">
    <div class="loading"><div class="spinner"></div><div class="loading-text">Carico esercizi...</div></div>
  </div>
</div>

<!-- PAGE: SESSIONE -->
<div class="page" id="page-sessione">
  <div class="page-header">
    <div class="header-text">
      <div class="page-title">Sessione</div>
      <div class="page-sub" id="sessionStatus">Seleziona il giorno</div>
    </div>
  </div>
  <div class="session-header">
    <div class="day-tabs" id="sessionDayTabs" style="padding:0;margin-bottom:12px"></div>
    <button class="start-btn" id="startSessionBtn" onclick="startSession()">Inizia sessione</button>
  </div>
  <div id="sessionContent"></div>
  <button class="save-session-btn" id="saveSessionBtn" onclick="saveSession()">Salva sessione</button>
</div>

<!-- PAGE: LOG -->
<div class="page" id="page-log">
  <div class="page-header">
    <div class="header-text">
      <div class="page-title">Storico</div>
      <div class="page-sub">Ultime sessioni</div>
    </div>
    <button class="refresh-btn" id="refreshLog" onclick="forceRefresh('log')" title="Aggiorna">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>
  </div>
  <div class="log-list" id="logList">
    <div class="loading"><div class="spinner"></div><div class="loading-text">Carico log...</div></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="nav">
  <button class="nav-btn active" onclick="showPage('scheda',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
    Scheda
  </button>
  <button class="nav-btn" onclick="showPage('esercizi',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    Esercizi
  </button>
  <button class="nav-btn" onclick="showPage('sessione',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Sessione
  </button>
  <button class="nav-btn" onclick="showPage('log',this);loadLog()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Storico
  </button>
</nav>

<!-- SEARCH OVERLAY -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-top">
    <input class="search-input" id="searchInput" placeholder="Cerca esercizio..." oninput="filterSearch()" autocomplete="off">
    <button class="search-cancel" onclick="closeSearch()">Annulla</button>
  </div>
  <div class="search-filters" id="searchFilterRow"></div>
  <div class="search-results" id="searchResults"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzLgG8S4CpW65ToeT1LbZ3g4bHwvRm4uII-OBuHCg9TSSBeSL883JPse9UqExnZ3_QC/exec';

// ============================================================
// STATE
// ============================================================
let scheda      = [];
let eserciziDB  = [];
let currentDay  = 'A';
let sessionDay  = 'A';
let sessionActive = false;
let timerInterval = null;
let timerSeconds  = 0;
let eseFilterGruppo  = '';
let srchFilterGruppo = '';
let openEseCard = null; // rowIndex aperto nell'elenco

// ============================================================
// API
// ============================================================
async function apiGet(action, params={}) {
  let urlStr = APPS_SCRIPT_URL + '?action=' + encodeURIComponent(action);
  Object.entries(params).forEach(([k,v]) => {
    urlStr += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(String(v));
  });
  const controller = new AbortController();
  const tid = setTimeout(() => controller.abort(), 20000);
  try {
    const r = await fetch(urlStr, {redirect:'follow', signal: controller.signal});
    clearTimeout(tid);
    const text = await r.text();
    try { return JSON.parse(text); }
    catch(e) {
      console.error('Risposta non JSON:', text.substring(0,500));
      return {ok:false, error:'Risposta non valida: ' + text.substring(0,80)};
    }
  } catch(e) {
    clearTimeout(tid);
    if (e.name==='AbortError') return {ok:false, error:'Timeout — Apps Script non risponde'};
    return {ok:false, error: e.message};
  }
}
async function apiPost(action, data) {
  return apiGet(action, {payload: JSON.stringify(data)});
}

// ============================================================
// INIT
// ============================================================
async function init() {
  await Promise.all([loadScheda(), loadEsercizi()]);
}

// ============================================================
// FORCE REFRESH
// ============================================================
async function forceRefresh(target) {
  const btnId = {scheda:'refreshScheda', esercizi:'refreshEsercizi', log:'refreshLog'}[target];
  const btn = document.getElementById(btnId);
  btn.classList.add('spinning');
  if (target === 'scheda')   await loadScheda();
  if (target === 'esercizi') await loadEsercizi();
  if (target === 'log')      await loadLog();
  btn.classList.remove('spinning');
  showToast('Aggiornato', 'success');
}

// ============================================================
// SCHEDA
// ============================================================
async function loadScheda() {
  const res = await apiGet('getScheda');
  if (!res.ok) { showToast('Errore scheda', 'error'); return; }
  scheda = res.data;
  const days = [...new Set(scheda.map(e=>e.gg))].sort();
  if (days.length && !days.includes(currentDay)) currentDay = days[0];
  renderDayTabs(days);
  renderScheda();
  document.getElementById('schedaStatus').textContent =
    scheda.filter(e=>e.gg===currentDay).length + ' esercizi · Giorno ' + currentDay;
  document.getElementById('addExBtn').style.display = '';
}

function renderDayTabs(days) {
  const labels = {A:'Giorno A', B:'Giorno B', C:'Giorno C'};
  document.getElementById('dayTabs').innerHTML = days.map(d =>
    `<button class="day-tab ${d===currentDay?'active':''}" onclick="selectDay('${d}')">${labels[d]||'Giorno '+d}</button>`
  ).join('');
  document.getElementById('sessionDayTabs').innerHTML = days.map(d =>
    `<button class="day-tab ${d===sessionDay?'active':''}" onclick="selectSessionDay('${d}')">${labels[d]||'Giorno '+d}</button>`
  ).join('');
}

function selectDay(d) {
  currentDay = d;
  document.querySelectorAll('#dayTabs .day-tab').forEach(b =>
    b.classList.toggle('active', b.textContent.trim() === ({A:'Giorno A',B:'Giorno B',C:'Giorno C'}[d]||'Giorno '+d)));
  document.getElementById('schedaStatus').textContent =
    scheda.filter(e=>e.gg===d).length + ' esercizi · Giorno ' + d;
  renderScheda();
}

function renderScheda() {
  const items = scheda.filter(e => e.gg === currentDay);
  const list  = document.getElementById('exList');
  if (!items.length) {
    list.innerHTML = `<div class="empty"><div class="empty-text">Nessun esercizio</div></div>`;
    return;
  }
  list.innerHTML = items.map((ex, idx) => {
    const isAct = ex.gruppo === 'Attivazione';
    return `
    <div class="ex-card ${isAct?'activation':''}">
      <div class="ex-header">
        <div class="ex-num">${isAct?'▲':idx+1}</div>
        <div class="ex-info">
          <div class="ex-name">${ex.esercizio}</div>
          <div class="ex-group">${ex.gruppo}</div>
        </div>
        <div class="ex-actions">
          <button class="ex-action-btn del" onclick="removeEx(${ex.rowIndex})" title="Rimuovi">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
          </button>
        </div>
      </div>
      <div class="ex-stats">
        <div class="stat-cell"><div class="stat-label">Serie</div><div class="stat-val">${ex.sets}</div></div>
        <div class="stat-cell"><div class="stat-label">Reps</div><div class="stat-val">${ex.reps}</div></div>
        <div class="stat-cell"><div class="stat-label">Peso kg</div><div class="stat-val accent">${ex.peso||'—'}</div></div>
        <div class="stat-cell"><div class="stat-label">Rec s</div><div class="stat-val">${ex.rec}</div></div>
      </div>
      <div class="readonly-note">Modifica kg/reps/serie → tab Esercizi</div>
    </div>`;
  }).join('');
}

async function removeEx(rowIndex) {
  if (!confirm('Rimuovi dalla scheda?')) return;
  const res = await apiPost('removeEsercizio', {rowIndex});
  if (res.ok) { scheda = scheda.filter(e=>e.rowIndex!==rowIndex); renderScheda(); showToast('Rimosso', 'success'); }
  else showToast('Errore', 'error');
}

// ============================================================
// ELENCO ESERCIZI
// ============================================================
async function loadEsercizi() {
  const res = await apiGet('getEsercizi');
  if (!res.ok) { showToast('Errore esercizi', 'error'); return; }
  eserciziDB = res.data;
  renderEseFilters();
  renderEsercizi();
  document.getElementById('eserciziStatus').textContent = eserciziDB.length + ' esercizi disponibili';
}

function renderEseFilters() {
  const gruppi = [...new Set(eserciziDB.map(e=>e.gruppo))].sort();
  document.getElementById('eseFilters').innerHTML = [
    `<button class="ese-filter active" onclick="setEseFilter('',this)">Tutti</button>`,
    ...gruppi.map(g=>`<button class="ese-filter" onclick="setEseFilter('${g}',this)">${g}</button>`)
  ].join('');
}

function setEseFilter(g, btn) {
  eseFilterGruppo = g;
  document.querySelectorAll('.ese-filter').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderEsercizi();
}

function renderEsercizi() {
  const q = (document.getElementById('eseSearch')?.value||'').toLowerCase();
  const filtered = eserciziDB.filter(e=>
    (!eseFilterGruppo || e.gruppo===eseFilterGruppo) &&
    (!q || e.nomeScheda.toLowerCase().includes(q) || e.nome.toLowerCase().includes(q) || e.variante.toLowerCase().includes(q))
  );
  const list = document.getElementById('eseList');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="empty-text">Nessun risultato</div></div>`;
    return;
  }
  list.innerHTML = filtered.map(e => `
    <div class="ese-card" id="esecard-${e.rowIndex}">
      <div class="ese-head" onclick="toggleEseCard(${e.rowIndex})">
        <div class="ese-head-info">
          <div class="ese-name">${e.nomeScheda}</div>
          <div class="ese-meta">${e.gruppo} · ${e.variante}</div>
        </div>
        <svg class="ese-chevron ${openEseCard===e.rowIndex?'open':''}" id="chev-${e.rowIndex}" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="ese-body ${openEseCard===e.rowIndex?'open':''}" id="esebody-${e.rowIndex}">
        ${e.spiegazione?`<div class="ese-spieg">${e.spiegazione}</div>`:''}
        <div class="ese-fields">
          <div class="ese-field"><label>Peso (kg)</label><input type="number" id="epeso-${e.rowIndex}" value="${e.peso||0}" min="0" step="0.5" inputmode="decimal"></div>
          <div class="ese-field"><label>Max (kg)</label><input type="number" id="emax-${e.rowIndex}" value="${e.max||0}" min="0" step="0.5" inputmode="decimal"></div>
          <div class="ese-field"><label>Serie</label><input type="number" id="esets-${e.rowIndex}" value="${e.sets||3}" min="1" max="10" inputmode="numeric"></div>
          <div class="ese-field"><label>Reps</label><input type="number" id="ereps-${e.rowIndex}" value="${e.reps||10}" min="1" max="50" inputmode="numeric"></div>
          <div class="ese-field"><label>Recupero (s)</label><input type="number" id="erec-${e.rowIndex}" value="${e.recupero||90}" min="30" step="10" inputmode="numeric"></div>
          <div class="ese-field"><label>Stima 1RM</label><input type="number" id="estima-${e.rowIndex}" value="${e.stima||0}" min="0" step="0.5" inputmode="decimal" readonly style="opacity:.5;cursor:default"></div>
        </div>
        <button class="ese-save-btn" onclick="saveEsercizio(${e.rowIndex})">Salva modifiche</button>
      </div>
    </div>
  `).join('');
}

function toggleEseCard(rowIndex) {
  const wasOpen = openEseCard === rowIndex;
  openEseCard = wasOpen ? null : rowIndex;
  // toggle solo le card visibili senza ri-renderizzare tutto
  document.querySelectorAll('.ese-body').forEach(b=>b.classList.remove('open'));
  document.querySelectorAll('.ese-chevron').forEach(c=>c.classList.remove('open'));
  if (!wasOpen) {
    document.getElementById('esebody-'+rowIndex)?.classList.add('open');
    document.getElementById('chev-'+rowIndex)?.classList.add('open');
  }
}

async function saveEsercizio(rowIndex) {
  const peso  = Number(document.getElementById('epeso-'+rowIndex)?.value||0);
  const max   = Number(document.getElementById('emax-'+rowIndex)?.value||0);
  const sets  = Number(document.getElementById('esets-'+rowIndex)?.value||3);
  const reps  = Number(document.getElementById('ereps-'+rowIndex)?.value||10);
  const rec   = Number(document.getElementById('erec-'+rowIndex)?.value||90);

  const res = await apiPost('updateEsercizioElenco', {rowIndex, peso, max, sets, reps, recupero: rec});
  if (res.ok) {
    const e = eserciziDB.find(e=>e.rowIndex===rowIndex);
    if (e) { e.peso=peso; e.max=max; e.sets=sets; e.reps=reps; e.recupero=rec; }
    showToast('Salvato su Sheets', 'success');
    toggleEseCard(rowIndex);
  } else {
    showToast((res.error||'Errore salvataggio').substring(0,60), 'error');
  }
}

// ============================================================
// SEARCH / ADD TO SCHEDA
// ============================================================
function openSearch() {
  srchFilterGruppo = '';
  document.getElementById('searchOverlay').classList.add('open');
  document.getElementById('searchInput').value = '';
  renderSearchFilters();
  filterSearch();
  setTimeout(()=>document.getElementById('searchInput').focus(), 300);
}
function closeSearch() { document.getElementById('searchOverlay').classList.remove('open'); }

function renderSearchFilters() {
  const gruppi = [...new Set(eserciziDB.map(e=>e.gruppo))].sort();
  document.getElementById('searchFilterRow').innerHTML = [
    `<button class="search-filter active" onclick="setSrchFilter('',this)">Tutti</button>`,
    ...gruppi.map(g=>`<button class="search-filter" onclick="setSrchFilter('${g}',this)">${g}</button>`)
  ].join('');
}
function setSrchFilter(g, btn) {
  srchFilterGruppo = g;
  document.querySelectorAll('.search-filter').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterSearch();
}
function filterSearch() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const res = eserciziDB.filter(e=>
    (!srchFilterGruppo || e.gruppo===srchFilterGruppo) &&
    (!q || e.nomeScheda.toLowerCase().includes(q) || e.nome.toLowerCase().includes(q))
  );
  document.getElementById('searchResults').innerHTML = res.length
    ? res.map(e=>`
      <div class="result-item" onclick="addEsercizio(${e.rowIndex})">
        <div class="result-name">${e.nomeScheda}</div>
        <div class="result-meta">${e.gruppo} · ${e.variante}</div>
        <div class="result-stats">
          <div class="result-stat">Serie <span>${e.sets}</span></div>
          <div class="result-stat">Reps <span>${e.reps}</span></div>
          <div class="result-stat">Peso <span>${e.peso||'—'} kg</span></div>
        </div>
      </div>`).join('')
    : `<div class="empty"><div class="empty-text">Nessun risultato</div></div>`;
}

async function addEsercizio(rowIndex) {
  const e = eserciziDB.find(e=>e.rowIndex===rowIndex);
  if (!e) return;
  closeSearch();
  const data = {
    gg: currentDay, nomeScheda: e.nomeScheda, gruppo: e.gruppo,
    sets: e.sets, reps: e.reps, rec: e.recupero, peso: e.peso
  };
  const res = await apiPost('addEsercizio', data);
  if (res.ok) { await loadScheda(); showToast('Aggiunto al giorno '+currentDay, 'success'); }
  else showToast('Errore aggiunta', 'error');
}

// ============================================================
// SESSIONE
// ============================================================
function selectSessionDay(d) {
  sessionDay = d;
  document.querySelectorAll('#sessionDayTabs .day-tab').forEach(b=>
    b.classList.toggle('active', b.textContent.trim() === ({A:'Giorno A',B:'Giorno B',C:'Giorno C'}[d]||'Giorno '+d)));
}

function startSession() {
  sessionActive = true;
  const items = scheda.filter(e=>e.gg===sessionDay && e.gruppo!=='Attivazione');
  document.getElementById('startSessionBtn').disabled = true;
  document.getElementById('sessionStatus').textContent = 'Sessione · Giorno '+sessionDay;
  document.getElementById('sessionContent').innerHTML = items.map(ex=>`
    <div class="session-ex" id="sex-${ex.rowIndex}">
      <div class="session-ex-head">
        <div class="session-ex-name">${ex.esercizio}</div>
        <button class="session-check" id="chk-${ex.rowIndex}" onclick="toggleExDone(${ex.rowIndex})">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#0f0f0f" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
      </div>
      <div class="serie-list">${Array.from({length:ex.sets},(_,i)=>`
        <div class="serie-row">
          <div class="serie-num">${i+1}</div>
          <input type="number" class="serie-input" id="peso-${ex.rowIndex}-${i}" value="${ex.peso||0}" min="0" step="0.5" inputmode="decimal">
          <div class="serie-sep">kg ×</div>
          <input type="number" class="serie-input" id="reps-${ex.rowIndex}-${i}" value="${ex.reps||0}" min="0" inputmode="numeric">
          <div class="serie-sep">reps</div>
          <button class="serie-done-btn" id="sdbtn-${ex.rowIndex}-${i}" onclick="toggleSerie(${ex.rowIndex},${i},${ex.rec})">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
        </div>`).join('')}
      </div>
    </div>`).join('');
  document.getElementById('saveSessionBtn').classList.add('visible');
}

function toggleSerie(rowIndex, idx, rec) {
  const btn = document.getElementById(`sdbtn-${rowIndex}-${idx}`);
  btn.classList.toggle('done');
  if (btn.classList.contains('done')) startTimer(rec);
}
function toggleExDone(rowIndex) {
  document.getElementById(`chk-${rowIndex}`)?.classList.toggle('done');
}

async function saveSession() {
  const items = scheda.filter(e=>e.gg===sessionDay && e.gruppo!=='Attivazione');
  const esercizi = items.map(ex=>({
    nome: ex.esercizio, rowIndex: ex.rowIndex,
    serie: Array.from({length:ex.sets},(_,i)=>({
      peso: Number(document.getElementById(`peso-${ex.rowIndex}-${i}`)?.value||0),
      reps: Number(document.getElementById(`reps-${ex.rowIndex}-${i}`)?.value||0)
    }))
  }));
  const res = await apiPost('saveLog', {
    gg: sessionDay, data: new Date().toLocaleDateString('it-IT'), esercizi
  });
  if (!res.ok) { showToast('Errore salvataggio', 'error'); return; }
  showToast('Sessione salvata!', 'success');
  document.getElementById('startSessionBtn').disabled = false;
  sessionActive = false;
  document.getElementById('saveSessionBtn').classList.remove('visible');
  document.getElementById('sessionContent').innerHTML = '';
  document.getElementById('sessionStatus').textContent = 'Seleziona il giorno';
}

// ============================================================
// TIMER
// ============================================================
function startTimer(seconds) {
  stopTimer();
  timerSeconds = seconds;
  document.getElementById('timerCount').textContent = timerSeconds;
  document.getElementById('timerBar').classList.add('visible');
  timerInterval = setInterval(()=>{
    timerSeconds--;
    document.getElementById('timerCount').textContent = timerSeconds;
    if (timerSeconds<=0) { stopTimer(); if(navigator.vibrate) navigator.vibrate([200,100,200]); }
  }, 1000);
}
function stopTimer() {
  clearInterval(timerInterval);
  document.getElementById('timerBar').classList.remove('visible');
}

// ============================================================
// LOG
// ============================================================
async function loadLog() {
  document.getElementById('logList').innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">Carico...</div></div>`;
  const res = await apiGet('getLog', {limit:100});
  if (!res.ok) { showToast('Errore log', 'error'); return; }
  const grouped = {};
  [...res.data].reverse().forEach(r=>{
    if(!grouped[r.data]) grouped[r.data]=[];
    grouped[r.data].push(r);
  });
  const list = document.getElementById('logList');
  if (!Object.keys(grouped).length) {
    list.innerHTML=`<div class="empty"><div class="empty-text">Nessuna sessione registrata</div></div>`; return;
  }
  list.innerHTML = Object.entries(grouped).map(([date,rows])=>`
    <div class="log-date-group">
      <div class="log-date-label">${date} · Giorno ${rows[0]?.gg}</div>
      ${rows.map(r=>`
        <div class="log-row">
          <div class="log-gg">${r.serie}</div>
          <div class="log-name">${r.esercizio}</div>
          <div class="log-detail"><span>${r.peso}</span> kg × <span>${r.reps}</span></div>
        </div>`).join('')}
    </div>`).join('');
}

// ============================================================
// NAV
// ============================================================
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show '+type;
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ============================================================
// START
// ============================================================
init();
</script>
</body>
</html>
